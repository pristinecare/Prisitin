name: CI test
run-name: build test on branch ${{github.repository}}

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master   
      
      
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
           node-version: 24

      - name: Debug version
        run: |
            node -v
            npm -v
            
      - name: Install dependecies
        run: npm ci

      - name: Build applicatioon
        run: npm run build
    
